# FriendLabs Nginx Configuration (No SSL - for initial testing)
# Stage 2.O: Reverse Proxy for VPS Deployment
#
# Use this config BEFORE setting up SSL with Certbot.
# After SSL setup, switch to nginx.conf
#
# Install on VPS: sudo cp nginx-nossl.conf /etc/nginx/sites-available/friendlabs
#                 sudo ln -s /etc/nginx/sites-available/friendlabs /etc/nginx/sites-enabled/

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name beta.friendlabs.ai _;

    # Basic auth for beta access
    auth_basic "FriendLabs Beta";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # API endpoints - proxy to API container
    # Note: CORS is handled by the Express API, not nginx
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gateway health check (internal use)
    location /gateway/health {
        proxy_pass http://127.0.0.1:18789/health;
        proxy_http_version 1.1;
    }

    # Dashboard - proxy to dashboard container
    location / {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # For Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}
