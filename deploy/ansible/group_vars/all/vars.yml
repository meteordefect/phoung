---
# Phoung v3 Ansible Variables

# Project settings
project_name: phoung
project_dir: /opt/phoung
compose_file: "{{ project_dir }}/docker-compose.yml"
env_file: "{{ project_dir }}/.env"

# Domain settings (loaded from .env or use default)
domain: "{{ lookup('env', 'DOMAIN') | default('beta.friendlabs.ai', true) }}"

# Docker settings
docker_version: "24.0"
docker_compose_version: "2.23.0"

# OpenClaw data directory
openclaw_data_path: /root/.openclaw

# Nginx settings
nginx_user: www-data
nginx_worker_processes: auto
nginx_worker_connections: 1024

# SSL (optional, for future)
ssl_enabled: true
ssl_cert_path: /etc/letsencrypt/live/{{ domain }}
